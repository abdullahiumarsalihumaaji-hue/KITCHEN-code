<!DOCTYPE html>
<html>
<head>
  <title>Cutlery - Benexx</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; margin:0; background:#f1f3f5; } /* Silver/grey background */
    h1 { text-align:center; padding:20px; background:linear-gradient(90deg,#adb5bd,#dee2e6); color:#212529; margin:0; } /* Metallic silver gradient */
    .back { display:block; text-align:center; padding:10px; background:#495057; color:white; text-decoration:none; } /* Steel grey */
    #products { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:15px; padding:20px; }
    .card { background:white; border-radius:10px; padding:10px; text-align:center; box-shadow:0 2px 5px rgba(0,0,0,0.1); border: 1px solid #ced4da; }
    .card img { width:100%; height:160px; object-fit:cover; border-radius:8px; }
    .card h3 { font-size:14px; margin:8px 0 4px; color:#343a40; }
    .price { color:#d62828; font-weight:bold; }
    .btn { display:block; background:#25D366; color:white; padding:8px; border-radius:5px; text-decoration:none; margin-top:6px; font-size:13px; }
  </style>
</head>
<body>
  <h1>Cutlery</h1>
  <a href="index.html" class="back">← Back to Categories</a>
  
  <div id="products">
    <!-- Replace image src with your cutlery pictures -->
    <div class="card">
      <img src="images/stainless-set.jpg" alt="Stainless Steel Cutlery Set 24pcs">
      <h3>Stainless Steel Cutlery Set 24pcs</h3>
      <div class="price">₦9,500</div>
      <a href="https://wa.me/234XXXXXXXXXX?text=Hi Benexx, I want Stainless Steel Cutlery Set 24pcs" class="btn" target="_blank">Order WhatsApp</a>
    </div>
    
    <div class="card">
      <img src="images/gold-spoon.jpg" alt="Gold Plated Spoon Set 6pcs">
      <h3>Gold Plated Spoon Set 6pcs</h3>
      <div class="price">₦7,200</div>
      <a href="https://wa.me/234XXXXXXXXXX?text=Hi Benexx, I want Gold Plated Spoon Set 6pcs" class="btn" target="_blank">Order WhatsApp</a>
    </div>
    
    <div class="card">
      <img src="images/knife-set.jpg" alt="Kitchen Knife Set 5pcs">
      <h3>Kitchen Knife Set 5pcs</h3>
      <div class="price">₦11,000</div>
      <a href="https://wa.me/234XXXXXXXXXX?text=Hi Benexx, I want Kitchen Knife Set 5pcs" class="btn" target="_blank">Order WhatsApp</a>
    </div>
  </div>
</body>
</html>
