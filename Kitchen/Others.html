<!DOCTYPE html>
<html>
<head>
  <title>Others - Benexx</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; margin:0; background:#f5f3ff; } /* Soft lavender background */
    h1 { text-align:center; padding:20px; background:linear-gradient(90deg,#8b5cf6,#a78bfa); color:white; margin:0; } /* Purple gradient */
    .back { display:block; text-align:center; padding:10px; background:#4c1d95; color:white; text-decoration:none; } /* Deep purple */
    #products { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:15px; padding:20px; }
    .card { background:white; border-radius:10px; padding:10px; text-align:center; box-shadow:0 2px 5px rgba(0,0,0,0.1); border: 1px solid #ddd6fe; }
    .card img { width:100%; height:160px; object-fit:cover; border-radius:8px; }
    .card h3 { font-size:14px; margin:8px 0 4px; color:#4c1d95; }
    .price { color:#d62828; font-weight:bold; }
    .btn { display:block; background:#25D366; color:white; padding:8px; border-radius:5px; text-decoration:none; margin-top:6px; font-size:13px; }
  </style>
</head>
<body>
  <h1>Others</h1>
  <a href="index.html" class="back">← Back to Categories</a>
  
  <div id="products">

      <img src="images/chopping-board.jpg" alt="Bamboo Chopping Board Set">

    </div>
    
    <div class="card">
      <img src="images/spice-rack.jpg" alt="Spice Rack 12 Bottles">

      <a href="https://wa.me/234XXXXXXXXXX?text=Hi Benexx, I want Spice Rack 12 Bottles" class="btn" target="_blank">Order WhatsApp</a>
    </div>
    
    <div class="card">
      <img src="images/kitchen-tools.jpg" alt="Kitchen Utensil Set 8pcs">
      <h3>Kitchen Utensil Set 8pcs</h3>
      <div class="price">₦5,800</div>
      <a href="https://wa.me/234XXXXXXXXXX?text=Hi Benexx, I want Kitchen Utensil Set 8pcs" class="btn" target="_blank">Order WhatsApp</a>
    </div>
  </div>
</body>
</html>
