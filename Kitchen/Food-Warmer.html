<!DOCTYPE html>
<html>
<head>
  <title>Food Flasks - Benexx</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; margin:0; background:#f8f8f8; }
    h1 { text-align:center; padding:20px; background:linear-gradient(90deg,#ff6b6b,#4ecdc4); color:white; margin:0; }
    .back { display:block; text-align:center; padding:10px; background:#333; color:white; text-decoration:none; }
    #products { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:15px; padding:20px; }
    .card { background:white; border-radius:10px; padding:10px; text-align:center; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .card img { width:100%; height:160px; object-fit:cover; border-radius:8px; }
    .card h3 { font-size:14px; margin:8px 0 4px; }
    .price { color:#e63946; font-weight:bold; }
    .btn { display:block; background:#25D366; color:white; padding:8px; border-radius:5px; text-decoration:none; margin-top:6px; font-size:13px; }
  </style>
</head>
<body>
  <h1>Food Flasks</h1>
  <a href="index.html" class="back">← Back to Categories</a>
  
  <div id="products">
    <!-- Replace image src with your warmer pictures -->
    <div class="card">
      <img src="images/sana.jpg" alt="Sana 3pcs">
      <h3>Sana 3pcs</h3>
      <div class="price">₦8,500</div>
      <a href="https://wa.me/234XXXXXXXXXX?text=Hi Benexx, I want Sana 3pcs" class="btn" target="_blank">Order WhatsApp</a>
    </div>
    
    <div class="card">
      <img src="images/barrister.jpg" alt="Barrister 3pcs">
      <h3>Barrister 3pcs</h3>
      <div class="price">₦9,200</div>
      <a href="https://wa.me/234XXXXXXXXXX?text=Hi Benexx, I want Barrister 3pcs" class="btn" target="_blank">Order WhatsApp</a>
    </div>
    
    <div class="card">
      <img src="images/samar.jpg" alt="Samar 3pcs">
      <h3>Samar 3pcs</h3>
      <div class="price">₦8,000</div>
      <a href="https://wa.me/234XXXXXXXXXX?text=Hi Benexx, I want Samar 3pcs" class="btn" target="_blank">Order WhatsApp</a>
    </div>
    
    <!-- Copy this .card block for Sigma, Sunny, etc. Just change img, h3, price, wa text -->
  </div>
</body>
</html>
